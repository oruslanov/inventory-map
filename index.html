<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Карта инвентаризаций F2</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="panel">
    <h1>Карта инвентаризаций F2</h1>

    <label>
      API-ключ Яндекс.Карт
      <input id="yandexKey" type="text" placeholder="Вставь ключ Яндекс.Карт" />
    </label>

    <label>
      Статус инвентаризации
      <select id="statusFilter">
        <option value="opergroup_survey" selected>Только opergroup_survey</option>
        <option value="primary_survey">Только primary_survey</option>
        <option value="primary_approval">Только primary_approval</option>
        <option value="act_signing">Только act_signing</option>
        <option value="documents_transferred">Только documents_transferred</option>
        <option value="document_preparation">Только document_preparation</option>
        <option value="object_setup">Только object_setup</option>
        <option value="paused">Только paused</option>
        <option value="">Все статусы</option>
      </select>
    </label>

    <label>
      Или свой status вручную
      <input id="customStatusFilter" type="text" placeholder="Например: opergroup_survey" />
    </label>

    <label>
      Фильтр по моей пометке
      <select id="markFilter">
        <option value="active" selected>Все, кроме скрытых</option>
        <option value="">Все, включая скрытые</option>
        <option value="unmarked">Только без пометки</option>
        <option value="green">Только зелёные</option>
        <option value="darkGreen">Только тёмно-зелёные</option>
        <option value="yellow">Только жёлтые</option>
        <option value="orange">Только оранжевые</option>
        <option value="red">Только красные</option>
        <option value="blue">Только синие</option>
        <option value="darkBlue">Только тёмно-синие</option>
        <option value="violet">Только фиолетовые</option>
        <option value="pink">Только розовые</option>
        <option value="brown">Только коричневые</option>
        <option value="gray">Только серые</option>
        <option value="black">Только чёрные</option>
        <option value="hidden">Только скрытые</option>
      </select>
    </label>

    <label>
      JSON-ответ из запроса /api/inventories
      <textarea id="jsonInput" rows="12" placeholder="Сюда вставь Response из DevTools запроса https://inventory.f2c.ru/api/inventories"></textarea>
    </label>

    <div class="buttons">
      <button id="loadBtn">Построить карту</button>
      <button id="clearCacheBtn">Очистить кэш координат</button>
      <button id="clearJsonBtn">Очистить JSON</button>
      <button id="clearMarksBtn">Сбросить мои пометки</button>
      <button id="exportMemoryBtn">Выгрузить память JSON</button>
      <button id="importMemoryBtn">Загрузить память JSON</button>
      <input id="importMemoryInput" type="file" accept="application/json,.json" hidden />
    </div>

    <div id="status">Готово. Вставь JSON из DevTools и нажми «Построить карту».</div>
  </div>

  <div id="map"></div>

  <script src="main.js"></script>
</body>
</html>
